<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Aura Flow Fit</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Shared Styles -->
    <link rel="stylesheet" href="/shared-styles.css?v=2026.04.13.PRODUCTION">

    <style>
        :root {
            /* Variables defined in shared-styles.css */
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-main);
            color: var(--text-high);
            overflow-x: hidden;
        }

        /* === MODERN SIDEBAR v2.0 === */
        .sidebar {
            position: fixed;
            top: 0; left: 0; width: var(--sidebar-width); height: 100vh;
            background: rgba(15, 15, 18, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            padding: 2rem 1.25rem;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            margin-bottom: 3rem;
            padding: 0 0.75rem;
            border-left: 4px solid var(--primary);
        }

        .sidebar-header h1 {
            font-family: var(--font-titles);
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-white);
            margin-bottom: 4px;
        }

        .logo-subtitle {
            font-size: 0.65rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        .nav-item {
            display: flex; align-items: center; gap: 1rem;
            padding: 12px 16px; border-radius: 12px;
            color: var(--text-medium);
            text-decoration: none; font-size: 0.9rem;
            font-weight: 500; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 4px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.15) 0%, transparent 100%);
            color: var(--primary);
            font-weight: 600;
            border-left: 2px solid var(--primary);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .nav-item:hover .nav-icon {
            opacity: 1;
            transform: scale(1.1);
            filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        .nav-divider {
            height: 1px; background: rgba(255,255,255,0.05);
            margin: 1.5rem 0;
        }

        /* === MAIN CONTENT === */
        .main-content {
            margin-left: 260px;
            flex: 1;
            min-height: 100vh;
            padding: 2rem;
            background: var(--bg-primary);
        }

        /* === HEADER === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .page-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-full);
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            color: var(--text-primary);
            font-size: 0.875rem;
            width: 220px;
            outline: none;
        }

        .icon-btn {
            position: relative;
            padding: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-full);
            cursor: pointer;
        }

        .user-avatar { width: 30px; height: 30px; border-radius: 50%; }
        .user-name { font-size: 0.8rem; font-weight: 600; }

        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-bottom: 1.5rem; }
        .kpi-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 1.25rem; }
        
        .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: var(--radius-full); font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .badge-info { background: rgba(59, 130, 246, 0.1); color: var(--info); }

        .btn { padding: 0.5rem 1rem; border-radius: var(--radius-md); font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 0.375rem; transition: all 0.2s ease; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-glow); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar-header h1, .logo-subtitle, .nav-item span { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>AURA <span style="color:var(--primary);">FLOW</span></h1>
                <span class="logo-subtitle">SaaS CRM</span>
            </div>

            <nav class="sidebar-nav">
                <a href="#dashboard" id="nav-dashboard" class="nav-item active">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#members" id="nav-members" class="nav-item">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span>Socios</span>
                </a>
                <a href="#leads" id="nav-leads" class="nav-item">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span>Leads</span>
                </a>
                <a href="#social" id="nav-social" class="nav-item">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg>
                    <span>Marketing Social</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#settings" id="nav-settings" class="nav-item">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>Configuración</span>
                </a>
            </nav>
        </aside>

        <div class="main-content">
            <header class="header">
                <div>
                    <h2 class="page-title">Dashboard</h2>
                    <p class="page-subtitle" id="greeting">Bienvenido al CRM Unificado</p>
                </div>
                <div class="header-right">
                    <div class="user-menu" onclick="handleLogout()">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=06B6D4&color=fff" class="user-avatar">
                        <span class="user-name" id="user-display">Admin</span>
                    </div>
                </div>
            </header>

            <div id="dashboard-view">
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <p style="font-size: .8rem; color: var(--text-muted);">Empresa Seleccionada</p>
                        <h3 id="current-company">Cargando...</h3>
                    </div>
                    <div class="kpi-card">
                        <p style="font-size: .8rem; color: var(--text-muted);">Posts Planificados</p>
                        <h3 id="planned-posts">0</h3>
                    </div>
                    <div class="kpi-card">
                        <p style="font-size: .8rem; color: var(--text-muted);">Socios Totales</p>
                        <h3 id="kpi-members">0</h3>
                    </div>
                    <div class="kpi-card">
                        <p style="font-size: .8rem; color: var(--text-muted);">Estado DB</p>
                        <h3 id="db-status"><span class="badge badge-info">Sincronizando...</span></h3>
                    </div>
                </div>
                <div id="dynamic-content"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js"></script>
    <script src="/dashboard/aura-auth-v23.js"></script>
    <script src="/dashboard/dashboard.js"></script>
</body>
</html>
