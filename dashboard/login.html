<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aura Flow Fit Admin</title>
    <link rel="stylesheet" href="../shared-styles.css?v=1.1.0">
    <style>
        :root {
            --primary: #06B6D4;
            --primary-glow: rgba(6, 182, 212, 0.4);
        }

        body {
            background: #09090B;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            z-index: 10;
        }

        .login-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-area {
            margin-bottom: 32px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--primary);
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        p {
            color: #A1A1AA;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #D4D4D8;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
        }

        .error-msg {
            color: #EF4444;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        /* Background decorative elements */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.15;
            z-index: 1;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="blob" style="top: -100px; right: -100px;"></div>
    <div class="blob" style="bottom: -100px; left: -100px;"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <span class="logo-text">AURA FLOW FIT</span>
            </div>
            <h1>Bienvenido, Equipo</h1>
            <p>Ingresa tus credenciales de acceso</p>

            <div id="login-modes" style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
                <button type="button" id="mode-magic" class="btn-sm" style="background: var(--primary); color: white; border: none; border-radius: 8px; padding: 5px 10px; cursor: pointer;">Magic Link</button>
                <button type="button" id="mode-pass" class="btn-sm" style="background: rgba(255,255,255,0.05); color: #A1A1AA; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 5px 10px; cursor: pointer;">Contraseña</button>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@auraflow.cl" required>
                </div>
                <div class="form-group" id="pass-group" style="display: none;">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button type="submit" id="submitBtn" class="btn-login">Enviar Enlace de Acceso</button>
                <div id="statusMsg" class="error-msg" style="color: var(--primary); background: rgba(6, 182, 212, 0.1);">Enlace enviado. Revisa tu correo.</div>
                <div id="errorMsg" class="error-msg">Error. Intenta de nuevo.</div>
            </form>
        </div>
    </div>

    <script>
        const btnMagic = document.getElementById('mode-magic');
        const btnPass = document.getElementById('mode-pass');
        const passGroup = document.getElementById('pass-group');
        const submitBtn = document.getElementById('submitBtn');
        let currentMode = 'magic';

        btnMagic.onclick = () => {
            currentMode = 'magic';
            passGroup.style.display = 'none';
            btnMagic.style.background = 'var(--primary)';
            btnMagic.style.color = 'white';
            btnPass.style.background = 'rgba(255,255,255,0.05)';
            btnPass.style.color = '#A1A1AA';
            submitBtn.textContent = 'Enviar Enlace de Acceso';
            document.getElementById('password').required = false;
        };

        btnPass.onclick = () => {
            currentMode = 'pass';
            passGroup.style.display = 'block';
            btnPass.style.background = 'var(--primary)';
            btnPass.style.color = 'white';
            btnMagic.style.background = 'rgba(255,255,255,0.05)';
            btnMagic.style.color = '#A1A1AA';
            submitBtn.textContent = 'Iniciar Sesión';
            document.getElementById('password').required = true;
        };
    </script>

    <script src="/scripts/guardian.js?v=2026.04.11.HOTFIX"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js?v=2026.04.11.HOTFIX"></script>
    <script src="/dashboard/aura-auth-v23.js?v=2026.04.11.HOTFIX"></script>
</body>

</html>
