<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso CRM - Multi-Tenant</title>
    <link rel="stylesheet" href="../shared-styles.css">
    <style>
        body { background: #09090B; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; color: white; margin: 0; }
        .login-card { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; color: #06B6D4; margin-bottom: 8px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: #D4D4D8; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 14px; background: #06B6D4; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3); }
        .status { margin-top: 15px; font-size: 13px; display: none; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">AURA FLOW CRM</div>
        <p style="color: #A1A1AA; margin-bottom: 30px;">Multi-Tenant Social CRM</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Corporativo</label>
                <input type="email" id="email" placeholder="ventas@auraflow.cl" required>
            </div>
            <button type="submit" id="submitBtn" class="btn-login">Enviar Enlace de Acceso</button>
        </form>
        <div id="statusMsg" class="status" style="background: rgba(6,182,212,0.1); color: #06B6D4;">¡Enlace enviado! Revisa tu correo.</div>
        <div id="errorMsg" class="status" style="background: rgba(239,68,68,0.1); color: #EF4444;">Error de autenticación.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js"></script>
    <script src="/dashboard/aura-auth-v23.js"></script>
</body>
</html>
